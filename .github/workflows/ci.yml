name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-lint-and-test:
    name: API – Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - name: Lint fix
        run: npm run lint:fix

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  app-lint-and-test:
    name: App – Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Lint fix
        run: npm run lint:fix

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  docker-build:
    name: Docker – Build images
    runs-on: ubuntu-latest
    needs: [api-lint-and-test, app-lint-and-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t aprove-me-api ./api

      - name: Build App image
        run: docker build -t aprove-me-app ./app
