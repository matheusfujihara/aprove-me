services:
  mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-bankme}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-bankme123}
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    restart: always
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - api_db:/data
    environment:
      - PORT=${PORT:-3001}
      - DATABASE_URL=file:../data/dev.db
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-bankme}:${RABBITMQ_PASS:-bankme123}@rabbitmq:5672
      - MAIL_HOST=${MAIL_HOST:-mailpit}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_USER=${MAIL_USER:-}
      - MAIL_PASS=${MAIL_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@bankme.com}
      - RABBITMQ_MAX_RETRIES=4
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started

  app:
    build:
      context: ./app
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  api_db: {}
